<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METASTADIUM | Enterprise Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-secondary: #8b5cf6;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .hero-container {
            text-align: center;
            max-width: 800px;
            padding: 4rem;
            background: radial-gradient(circle at center, rgba(56, 189, 248, 0.05) 0%, transparent 70%);
        }

        .badge-premium {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            padding: 0.5rem 1.5rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        h1 {
            font-weight: 800;
            font-size: 4rem;
            letter-spacing: -0.05em;
            margin-bottom: 1.5rem;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.lead {
            color: var(--text-dim);
            font-size: 1.25rem;
            margin-bottom: 3rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-portal {
            background: #fff;
            color: #000;
            font-weight: 700;
            padding: 1rem 2.5rem;
            border-radius: 0.75rem;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.1rem;
            border: none;
        }

        .btn-portal:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
            background: var(--accent-primary);
            color: #fff;
        }

        /* Ambient animation */
        .ambient-light {
            position: absolute;
            top: -10%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="ambient-light"></div>
    <div class="hero-container">
        <div class="badge-premium">Organizational Intelligence</div>
        <h1>METASTADIUM</h1>
        <p class="lead">Autonomous high-frequency trading observability and log intelligence pipeline.</p>
        
        <div class="d-flex justify-content-center gap-3">
            <div class="d-flex flex-column align-items-center gap-3">
                <a href="coinbase_log_dashboard.html" class="btn-portal">
                    Launch Coinbase Insights
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                </a>
                <a href="nn_performance.html" class="btn-portal" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border);">
                    Neural Network Analytics
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19V5l12 7-12 7z"></path></svg>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
