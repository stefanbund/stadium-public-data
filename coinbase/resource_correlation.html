
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resource & Event Correlation</title>
    <!-- Use pinned versions for stability -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.0.1"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --green: #4ade80;
            --red: #f87171;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
        }
        h1 { margin: 0; font-size: 1.5rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .card {
            background: var(--card);
            border: 1px solid #334155;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        .refresh { font-size: 11px; color: var(--text-dim); text-align: right; margin-top: 1rem; opacity: 0.7; }
        .legend {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 12px;
            font-weight: 600;
        }
        .legend-item { display: flex; align-items: center; gap: 0.5rem; }
        .dot { width: 12px; height: 12px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Resource & Event Correlation</h1>
            <div style="text-align: right">
                <div style="font-size: 11px; color: var(--text-dim); text-transform: uppercase;">Node Health Monitor</div>
                <div style="font-weight: 800; color: var(--text); font-family: 'Outfit', sans-serif;">coinbase.local</div>
            </div>
        </div>

        <div class="card">
            <div class="legend">
                <div class="legend-item"><div class="dot" style="background: #38bdf8;"></div> CPU %</div>
                <div class="legend-item"><div class="dot" style="background: #a855f7;"></div> RAM %</div>
                <div class="legend-item"><div class="dot" style="background: #f472b6;"></div> SYSTEM EVENTS</div>
            </div>
            <div style="height: 450px; width: 100%;">
                <canvas id="resourceChart"></canvas>
            </div>
        </div>

        <div class="refresh">Updated: 2026-05-02 10:05:21 | Sample Count: 100</div>
    </div>

        new Chart(ctx, {

</body>
</html>
