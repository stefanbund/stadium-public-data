
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resource & Event Correlation</title>
    <!-- Use pinned versions for stability -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.0.1"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --green: #4ade80;
            --red: #f87171;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
        }
        h1 { margin: 0; font-size: 1.5rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .card {
            background: var(--card);
            border: 1px solid #334155;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        .refresh { font-size: 11px; color: var(--text-dim); text-align: right; margin-top: 1rem; opacity: 0.7; }
        .legend {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 12px;
            font-weight: 600;
        }
        .legend-item { display: flex; align-items: center; gap: 0.5rem; }
        .dot { width: 12px; height: 12px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Resource & Event Correlation</h1>
            <div style="text-align: right">
                <div style="font-size: 11px; color: var(--text-dim); text-transform: uppercase;">Node Health Monitor</div>
                <div style="font-weight: 800; color: var(--text); font-family: 'Outfit', sans-serif;">stefans-Mac-mini.local</div>
            </div>
        </div>

        <div class="card">
            <div class="legend">
                <div class="legend-item"><div class="dot" style="background: #38bdf8;"></div> CPU %</div>
                <div class="legend-item"><div class="dot" style="background: #a855f7;"></div> RAM %</div>
                <div class="legend-item"><div class="dot" style="background: #f472b6;"></div> SYSTEM EVENTS</div>
            </div>
            <div style="height: 450px; width: 100%;">
                <canvas id="resourceChart"></canvas>
            </div>
        </div>

        <div class="refresh">Updated: 2026-04-19 18:53:08 | Sample Count: 10</div>
    </div>

    <script>
        const labels = ["04-19 10:46", "04-19 11:46", "04-19 12:00", "04-19 12:52", "04-19 13:51", "04-19 14:51", "04-19 15:52", "04-19 16:52", "04-19 17:52", "04-19 18:53"];
        const cpuData = [14.2, 18.5, 15.0, 34.4, 3.9, 2.1, 4.2, 15.6, 15.6, 5.1];
        const memData = [60.6, 61.2, 60.8, 60.2, 52.0, 57.0, 58.3, 60.5, 61.8, 60.9];
        const rawEvents = [{"x": "04-19 10:46", "text": "Inference: True (SHPING)"}, {"x": "04-19 10:46", "text": "Inference: True (TIME)"}, {"x": "04-19 11:46", "text": "Inference: True (BTC)"}, {"x": "04-19 12:52", "text": "BOOT_COMPLETE"}, {"x": "04-19 12:52", "text": "WATCHDOG_RESTART"}];

        // Convert events to correct annotation objects for Chart.js Annotation Plugin 2.x
        const eventAnnotations = {};
        rawEvents.forEach((evt, idx) => {
            eventAnnotations['event' + idx] = {
                type: 'line',
                xMin: evt.x,
                xMax: evt.x,
                borderColor: 'rgba(244, 114, 182, 0.6)',
                borderWidth: 2,
                borderDash: [5, 5],
                label: {
                    display: true,
                    content: evt.text,
                    backgroundColor: 'rgba(244, 114, 182, 0.9)',
                    color: '#fff',
                    font: { size: 10, weight: 'bold' },
                    position: 'start',
                    yAdjust: -10 * (idx % 5) // Stagger labels if multiple events at same time
                }
            };
        });

        const ctx = document.getElementById('resourceChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'CPU %',
                        data: cpuData,
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.15)',
                        fill: true,
                        tension: 0.2,
                        pointRadius: labels.length === 1 ? 5 : 2,
                        borderWidth: 2
                    },
                    {
                        label: 'MEM %',
                        data: memData,
                        borderColor: '#a855f7',
                        backgroundColor: 'rgba(168, 85, 247, 0.15)',
                        fill: true,
                        tension: 0.2,
                        pointRadius: labels.length === 1 ? 5 : 2,
                        borderWidth: 2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 500 },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: { color: '#94a3b8', font: { size: 11 } },
                        title: { display: true, text: 'USAGE %', color: '#64748b', font: { size: 10, weight: 'bold' } }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#94a3b8', font: { size: 11 }, maxRotation: 45, minRotation: 45 }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        backgroundColor: '#1e293b',
                        titleColor: '#38bdf8',
                        bodyColor: '#f8fafc',
                        borderColor: '#334155',
                        borderWidth: 1
                    },
                    annotation: {
                        annotations: eventAnnotations
                    }
                }
            }
        });
    </script>
</body>
</html>
