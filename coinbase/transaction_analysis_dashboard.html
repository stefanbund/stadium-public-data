<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>METASTADIUM | Transaction Intelligence</title>
    
    <!-- Design Foundation -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    
    <style>
        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --accent-primary: #38bdf8;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 2rem;
            line-height: 1.5;
        }

        .dashboard-container { max-width: 1400px; margin: 0 auto; }

        header {
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 { font-weight: 800; font-size: 2.2rem; letter-spacing: -0.05em; margin-bottom: 0.25rem; }
        .subtitle { color: var(--text-dim); font-size: 0.95rem; }
        .last-updated { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }

        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }
        .kpi-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 1rem;
            text-align: center;
            transition: transform 0.2s;
        }
        .kpi-card:hover { transform: translateY(-3px); border-color: var(--accent-primary); }
        .kpi-value { font-size: 2rem; font-weight: 800; color: #fff; line-height: 1; margin-bottom: 0.25rem; }
        .kpi-label { color: var(--text-dim); text-transform: uppercase; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; }

        /* Chart Section */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            margin-bottom: 2.5rem;
        }
        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 1rem;
            height: 500px;
        }

        /* Tables */
        .section-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.25rem; color: var(--accent-primary); display: flex; align-items: center; gap: 0.5rem; }
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
            margin-bottom: 2.5rem;
        }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th { padding: 1rem; background: rgba(255,255,255,0.03); color: var(--text-dim); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; border-bottom: 1px solid var(--border); }
        td { padding: 1rem; border-bottom: 1px solid var(--border); }
        
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-hit { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-miss { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .badge-waiting { background: rgba(148, 163, 184, 0.15); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.2); }

        .symbol-tag { background: #1e293b; padding: 0.1rem 0.5rem; border-radius: 4px; font-weight: 700; color: var(--accent-primary); }

        /* Loading Overlay */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        .spinner { width: 50px; height: 50px; border: 3px solid var(--border); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 1000px) {
            .main-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div class="dashboard-container">
        <header>
            <div>
                <h1>Transaction Intelligence</h1>
                <p class="subtitle">Post-hoc backtesting of APPROVED signals vs +1.01% target</p>
            </div>
            <div class="last-updated" id="last-updated-text">Syncing...</div>
        </header>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-value" id="kpi-total">0</div>
                <div class="kpi-label">Total Signals</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="kpi-hit-rate" style="color: var(--accent-success)">0%</div>
                <div class="kpi-label">Hit Rate</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="kpi-hits">0</div>
                <div class="kpi-label">Total Hits</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="kpi-waiting">0</div>
                <div class="kpi-label">In Waiting</div>
            </div>
        </div>

        <div class="main-layout">
            <div class="chart-card">
                <h2 class="section-title">Outcome Distribution</h2>
                <div id="outcome-chart" style="height: 420px;"></div>
            </div>
            <div class="chart-card">
                <h2 class="section-title">Success Split</h2>
                <div id="pie-chart" style="height: 420px;"></div>
            </div>
        </div>

        <h2 class="section-title">🕒 Active Trade Ledger</h2>
        <div class="table-container">
            <table id="signals-table">
                <thead>
                    <tr>
                        <th>Symbol</th>
                        <th>Timestamp</th>
                        <th>Outcome</th>
                        <th>Entry Price</th>
                        <th>Performance Detail</th>
                    </tr>
                </thead>
                <tbody id="signals-body">
                    <!-- Dynamic Rows -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadDashboardData() {
            try {
                // Fetch the JSON (cache bust with timestamp)
                const response = await fetch('approved_signal_analysis.json?v=' + Date.now());
                const data = await response.json();
                
                renderDashboard(data);
                
                // Remove loader
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 500);
            } catch (error) {
                console.error('Error loading dashboard data:', error);
                document.getElementById('last-updated-text').innerText = 'ERROR LOADING DATA';
            }
        }

        function renderDashboard(data) {
            // Update Text Data
            document.getElementById('last-updated-text').innerText = 'Last Sync: ' + data.meta.last_updated;
            document.getElementById('kpi-total').innerText = data.kpis.total_signals;
            document.getElementById('kpi-hit-rate').innerText = data.kpis.hit_rate_pct + '%';
            document.getElementById('kpi-hits').innerText = data.kpis.hits;
            document.getElementById('kpi-waiting').innerText = data.kpis.waiting;

            // Render Outcomes Chart
            renderOutcomeChart(data.signals);
            renderPieChart(data.kpis);
            
            // Render Table
            renderTable(data);
        }

        function renderOutcomeChart(signals) {
            // Group outcomes by day for a trend if needed, or just showing latest 50
            const latestSignals = signals.slice(-50);
            const x = latestSignals.map(s => s.timestamp);
            const y = latestSignals.map(s => s.outcome === 'HIT' ? 1 : (s.outcome === 'MISS' ? -1 : 0));
            const colors = latestSignals.map(s => s.outcome === 'HIT' ? '#10b981' : (s.outcome === 'MISS' ? '#ef4444' : '#94a3b8'));

            const trace = {
                x: x,
                y: y,
                type: 'bar',
                marker: { color: colors },
                name: 'Signal Outcome'
            };

            const layout = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#94a3b8' },
                margin: { t: 10, b: 40, l: 30, r: 10 },
                xaxis: { showgrid: false, zeroline: false },
                yaxis: { 
                    tickvals: [-1, 0, 1],
                    ticktext: ['MISS', 'WAIT', 'HIT'],
                    gridcolor: 'rgba(255,255,255,0.05)'
                }
            };

            Plotly.newPlot('outcome-chart', [trace], layout, {responsive: true, displayModeBar: false});
        }

        function renderPieChart(kpis) {
            const data = [{
                values: [kpis.hits, kpis.misses, kpis.waiting],
                labels: ['HIT', 'MISS', 'WAIT'],
                type: 'pie',
                hole: 0.6,
                marker: {
                    colors: ['#10b981', '#ef4444', '#334155']
                },
                textinfo: 'label+percent',
                insidetextorientation: 'radial'
            }];

            const layout = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { color: '#94a3b8' },
                showlegend: false,
                margin: { t: 0, b: 0, l: 0, r: 0 }
            };

            Plotly.newPlot('pie-chart', data, layout, {responsive: true, displayModeBar: false});
        }

        function renderTable(data) {
            const signals = data.signals;
            const body = document.getElementById('signals-body');
            body.innerHTML = '';
            
            // Show last 100 signals at most to keep it snappy
            const displaySignals = [...signals].reverse().slice(0, 100);
            
            displaySignals.forEach(s => {
                const tr = document.createElement('tr');
                
                const timeStr = new Date(s.timestamp).toLocaleString(undefined, {
                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                const badgeClass = s.outcome === 'HIT' ? 'badge-hit' : (s.outcome === 'MISS' ? 'badge-miss' : 'badge-waiting');
                const outcomeText = s.outcome === 'NO_DATA' ? 'WAITING' : s.outcome;
                
                const entryPrice = s.entry_price ? '$' + s.entry_price.toFixed(6) : '-';
                let detailText = '-';
                
                if (s.outcome === 'HIT') {
                    detailText = `HIT in ${Math.round(s.detail)} min`;
                } else if (s.outcome === 'MISS') {
                    detailText = `Max gain: +${s.detail.toFixed(2)}%`;
                } else if (s.outcome === 'NO_DATA') {
                    // For waiting, calculate distance to target
                    const target = data.meta.target_gain_pct || 1.01;
                    const currentGain = s.detail || 0;
                    const dist = target - currentGain;
                    
                    if (dist <= 0) {
                        detailText = 'Target Reached (Pending Sync)';
                    } else {
                        const style = dist < 0.5 ? 'style="color: var(--accent-success); font-weight: 700;"' : '';
                        detailText = `<span ${style}>${dist.toFixed(2)}% from target</span> (+${currentGain.toFixed(2)}% current)`;
                    }
                }

                tr.innerHTML = `
                    <td><span class="symbol-tag">${s.symbol}</span></td>
                    <td>${timeStr}</td>
                    <td><span class="badge ${badgeClass}">${outcomeText}</span></td>
                    <td>${entryPrice}</td>
                    <td>${detailText}</td>
                `;
                body.appendChild(tr);
            });
        }

        // Initialize
        window.onload = loadDashboardData;
        
        // Auto-refresh every 5 minutes
        setInterval(loadDashboardData, 300000);
    </script>
</body>
</html>
