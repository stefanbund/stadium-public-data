<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METASTADIUM | Bot Symbol Activity Index</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #020617;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-success: #10b981;
            --accent-warning: #fbbf24;
            --accent-danger: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            padding: 2rem;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 3rem; position: relative; }
        .back-link { position: absolute; left: 0; top: 0; color: var(--accent-primary); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        h1 { font-weight: 800; font-size: 2.5rem; text-align: center; color: #fff; }
        .p-sub { text-align: center; color: var(--text-dim); margin-top: 0.5rem; }

        .chart-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 1.5rem;
            margin-bottom: 2rem;
        }
        .canvas-wrapper { width: 100%; position: relative; height: 800px; }

        /* Tooltip styling */
        #chartjs-tooltip {
            opacity: 0;
            position: absolute;
            background: rgba(15, 23, 42, 0.98);
            color: white;
            border-radius: 8px;
            padding: 14px;
            pointer-events: none;
            transition: all .1s ease;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7);
            border: 1px solid var(--accent-primary);
            z-index: 1000;
            width: 500px;
            font-size: 0.85rem;
        }
        .tooltip-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 10px; color: var(--accent-primary); border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        .tooltip-item { margin-bottom: 10px; }
        .tooltip-time { color: var(--text-dim); font-weight: 600; font-size: 0.75rem; }
        .tooltip-lvl { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-right: 6px; font-weight: 800; }
        .lvl-INFO { background: var(--accent-success); color: #000; }
        .lvl-WARNING { background: var(--accent-warning); color: #000; }
        .lvl-ERROR { background: var(--accent-danger); color: #fff; }
    </style>
</head>
