<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trader Operations Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface: #1e293b;
            --primary: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--primary);
        }
        .header .meta {
            text-align: right;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(autofit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-card h3 {
            margin: 0 0 0.5rem 0;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 1rem;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
        }
        .table-container {
            background: var(--surface);
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.2);
        }
        tbody tr:hover {
            background: rgba(255,255,255,0.02);
        }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge.success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        .badge.danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
    </style>
</head>
<body>
    <div class="header">
        <h1>Trader Operations Telemetry</h1>
        <div class="meta">
            <div><strong>Last Synced:</strong> 2026-03-22 10:20:09</div>
            <div><strong>Location:</strong> Target Host / Production Daemon</div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Triggers</h3>
            <p class="value">0</p>
        </div>
        <div class="stat-card">
            <h3>Successful Clears</h3>
            <p class="value" style="color: var(--success)">0</p>
        </div>
        <div class="stat-card">
            <h3>Failed Cycles</h3>
            <p class="value" style="color: var(--danger)">0</p>
        </div>
        <div class="stat-card">
            <h3>Execution Rate</h3>
            <p class="value" style="color: var(--primary)">N/A</p>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Status</th>
                    <th>Symbol</th>
                    <th>Size Executed</th>
                    <th>Bought (Limit)</th>
                    <th>Sold (Calculated)</th>
                    <th>Order IDs</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>
    </div>
</body>
</html>
